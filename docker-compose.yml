services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - AI_CHAT_SERVICE_URL=http://ai-chat:3001
      - OCR_SERVICE_URL=http://ocr:3002
      - VOICE_SERVICE_URL=http://voice:3003
      - REDIS_URL=redis://redis:6379
    depends_on:
      - ai-chat
      - ocr
      - voice
      - redis
    restart: always

  ai-chat:
    build:
      context: ../liafon-ai-chat
      dockerfile: dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - OLLAMA_HOST=http://ollama:11434
    restart: always

  ocr:
    build:
      context: ../liafon-ocr
      dockerfile: dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
    restart: always

  voice:
    build:
      context: ../liafon-voice
      dockerfile: dockerfile
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: always

volumes:
  redis-data:
  ollama-data:

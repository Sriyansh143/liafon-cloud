name: liafon_cloud
description: "Liafon Cloud - Advanced Smartwatch Companion App with AI Health Monitoring, Marketplace & Voice Agents"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  get: ^4.6.6
  
  # Bluetooth LE for Watch Connection
  flutter_blue_plus: ^1.31.9
  
  # Backend & Database (FREE - Self-hosted PocketBase)
  pocketbase: ^0.18.0
  
  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0
  
  # Local Storage (FREE - Hive embedded DB)
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  
  # Charts & Visualization
  fl_chart: ^0.66.0
  charts_flutter: ^0.12.0
  syncfusion_flutter_charts: ^24.2.8
  
  # Health & Fitness
  health: ^10.1.0
  fitness: ^0.2.1
  pedometer: ^4.0.2
  
  # Permissions
  permission_handler: ^11.3.0
  
  # Location
  geolocator: ^11.0.0
  location: ^6.0.0
  
  # Notifications (FREE - Firebase FCM)
  flutter_local_notifications: ^17.0.0
  
  # Audio & Voice (FREE - Local processing)
  just_audio: ^0.9.36
  record: ^5.0.4
  speech_to_text: ^6.6.0
  audio_session: ^0.1.18
  
  # Camera & OCR (FREE - PaddleOCR via API)
  camera: ^0.10.5
  google_mlkit_text_recognition: ^0.11.0
  image_picker: ^1.0.7
  
  # PDF Generation (FREE - Local)
  pdf: ^3.10.7
  printing: ^5.12.0
  
  # Maps (FREE - OpenStreetMap)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # WebSocket & Realtime
  web_socket_channel: ^2.4.0
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2
  battery_plus: ^5.0.2
  device_info_plus: ^10.0.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  file_picker: ^6.1.1
  android_intent_plus: ^5.0.2
  
  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  animate_do: ^3.3.4
  flutter_animate: ^4.3.0
  
  # WhatsApp Integration (FREE - Baileys alternative via URL scheme)
  whatsapp_share: ^2.0.1
  
  # Background Processing
  workmanager: ^0.5.2
  flutter_background_service: ^5.0.5
  
  # Security
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.3
  
  # Biometrics
  local_auth: ^2.1.8
  
  # Calendar Integration
  device_calendar: ^4.3.2
  
  # Contacts
  contacts_service: ^0.6.3
  
  # Phone Calls
  phone_state: ^3.0.0
  telephony: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  isar_generator: ^3.1.0+1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
